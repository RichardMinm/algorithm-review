<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<title>算法设计与分析 · 交互式刷题</title>
<style>
:root {
  --bg: #f6f7f3;
  --panel: #ffffff;
  --panel-soft: #fbfcf8;
  --text: #1d2328;
  --muted: #66706b;
  --line: #dfe4dc;
  --accent: #1f7a5a;
  --accent-strong: #176848;
  --accent-weak: #e5f3ed;
  --warn: #b76623;
  --danger: #b44242;
  --danger-weak: #fae9e7;
  --ok: #24764d;
  --ok-weak: #e7f4ec;
  --ink: #263238;
  --shadow: 0 12px 34px rgba(31, 45, 39, 0.08);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", sans-serif;
  letter-spacing: 0;
}

button,
input,
select,
textarea {
  font: inherit;
}

button {
  border: 0;
  cursor: pointer;
  transition: background 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease, color 0.18s ease, transform 0.18s ease;
}

button:disabled {
  cursor: not-allowed;
  opacity: 0.52;
}

.mobile-menu-btn,
.drawer-overlay {
  display: none;
}

button:focus-visible,
input:focus-visible,
select:focus-visible,
textarea:focus-visible {
  outline: 3px solid rgba(31, 122, 90, 0.2);
  outline-offset: 2px;
}

.app-shell {
  min-height: 100vh;
  display: grid;
  grid-template-columns: minmax(300px, 360px) 1fr;
}

.sidebar {
  position: sticky;
  top: 0;
  height: 100vh;
  overflow: auto;
  padding: 22px;
  border-right: 1px solid var(--line);
  background: #fbfcf8;
  backdrop-filter: blur(10px);
}

.brand h1 {
  margin: 0;
  color: var(--text);
  font-size: 23px;
  line-height: 1.25;
}

.brand p,
.topbar p {
  margin: 6px 0 0;
  color: var(--muted);
  font-size: 13px;
}

.mode-tabs {
  display: grid;
  gap: 10px;
  margin: 22px 0;
}

.sub-menu {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}

.mode-tab,
.filters select,
.filters input,
.list-head button,
.ghost,
.mark-btn,
.self-check button,
.pager button,
.fill-area button {
  min-height: 38px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--panel);
  color: var(--ink);
}

.mode-tab.active,
.mode-tab:hover,
.list-head button:hover,
.ghost:hover {
  border-color: #9ac9b6;
  background: var(--accent-weak);
  color: var(--accent);
}

.mode-tab.active {
  box-shadow: inset 0 0 0 1px rgba(31, 122, 90, 0.16);
  font-weight: 700;
}

.main-menu {
  width: 100%;
  min-height: 46px;
  font-size: 16px;
  font-weight: 800;
}

.stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-bottom: 20px;
}

.stats div {
  padding: 12px 8px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--panel);
  text-align: center;
}

.stats span {
  display: block;
  font-weight: 800;
  font-size: 20px;
  color: var(--accent);
}

.stats small {
  color: var(--muted);
}

.filters {
  display: grid;
  gap: 12px;
}

.filters label {
  display: grid;
  gap: 6px;
}

.filters span {
  color: var(--muted);
  font-size: 13px;
}

.filters select,
.filters input {
  width: 100%;
  padding: 0 12px;
}

.filters select:hover,
.filters input:hover {
  border-color: #9ac9b6;
}

.study-tools {
  display: grid;
  gap: 8px;
  margin: 18px 0 0;
}

.study-tools button,
.import-btn {
  display: inline-grid;
  place-items: center;
  min-height: 38px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--panel);
  color: var(--ink);
  cursor: pointer;
}

.sidebar-dark-btn {
  width: 100%;
}

.study-tools button:hover,
.import-btn:hover {
  border-color: #9ac9b6;
  background: var(--accent-weak);
  color: var(--accent);
}

#importHint {
  color: var(--muted);
  font-size: 12px;
  line-height: 1.5;
}

.list-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin: 22px 0 10px;
}

.list-head button {
  padding: 0 14px;
}

.question-nav {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(46px, 1fr));
  gap: 8px;
  padding-bottom: 24px;
}

.nav-item {
  position: relative;
  height: 42px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--panel);
  color: var(--text);
  font-size: 13px;
  font-weight: 700;
}

.nav-item.done {
  background: var(--ok-weak);
  border-color: #b7dcc7;
  color: var(--ok);
}

.nav-item.wrong {
  background: var(--danger-weak);
  border-color: #e3b5ad;
  color: var(--danger);
}

.nav-item:hover {
  transform: translateY(-1px);
  border-color: #9ac9b6;
}

.nav-item.active,
.nav-item.active.done,
.nav-item.active.wrong {
  border-color: var(--accent);
  background: var(--accent);
  color: #fff;
  box-shadow: 0 8px 18px rgba(31, 122, 90, 0.18);
}

.nav-item.marked::after {
  content: "★";
  position: absolute;
  top: -7px;
  right: -4px;
  color: var(--warn);
  font-size: 13px;
}

.main {
  min-width: 0;
  padding: 30px clamp(18px, 4vw, 46px);
}

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 16px;
  max-width: 1040px;
  margin-bottom: 22px;
}

.topbar h2 {
  margin: 2px 0 0;
  font-size: 26px;
}

.top-actions {
  display: flex;
  gap: 10px;
}

.ghost {
  padding: 0 14px;
}

.question-card {
  max-width: 1040px;
  min-height: 640px;
  padding: clamp(20px, 3vw, 30px);
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--panel);
  box-shadow: var(--shadow);
}

.question-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
}

.badge {
  display: inline-flex;
  align-items: center;
  min-height: 30px;
  padding: 0 10px;
  border-radius: 999px;
  background: #edf0e8;
  color: #3b463d;
  font-size: 13px;
  font-weight: 700;
}

.progress-text {
  margin-left: 10px;
  color: var(--muted);
  font-size: 13px;
}

.progress-bar {
  height: 8px;
  margin: 18px 0 0;
  overflow: hidden;
  border-radius: 999px;
  background: #edf0e8;
}

.progress-bar span {
  display: block;
  width: 0;
  height: 100%;
  border-radius: inherit;
  background: var(--accent);
  transition: width 0.24s ease;
}

.mark-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 0 12px;
}

.mark-btn.active {
  border-color: #e0b269;
  background: #fff4df;
  color: #8a5a10;
}

.question-card h3 {
  margin: 22px 0 12px;
  font-size: clamp(20px, 2.3vw, 24px);
  line-height: 1.35;
}

.prompt,
#answerText {
  margin: 0;
  white-space: pre-wrap;
  word-break: break-word;
  color: var(--text);
  font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", sans-serif;
  line-height: 1.72;
}

.prompt {
  padding: 16px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--panel-soft);
}

.question-image {
  display: none;
  max-width: min(100%, 520px);
  margin: 16px 0 8px;
  border: 1px solid var(--line);
  border-radius: 8px;
}

.choice-area {
  display: grid;
  gap: 10px;
  margin-top: 22px;
}

.option-btn {
  display: grid;
  grid-template-columns: 36px 1fr;
  align-items: center;
  gap: 12px;
  width: 100%;
  padding: 13px 14px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fff;
  color: var(--text);
  text-align: left;
  line-height: 1.55;
}

.option-key {
  display: inline-grid;
  place-items: center;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: #eef1ec;
  font-weight: 800;
}

.option-btn:hover {
  border-color: #9ac9b6;
  box-shadow: 0 8px 20px rgba(31, 45, 39, 0.06);
}

.option-btn.correct {
  border-color: #83c49b;
  background: var(--ok-weak);
}

.option-btn.correct .option-key {
  background: var(--ok);
  color: #fff;
}

.option-btn.wrong {
  border-color: #df9a90;
  background: var(--danger-weak);
}

.option-btn.wrong .option-key {
  background: var(--danger);
  color: #fff;
}

.fill-area,
.subjective-area {
  display: none;
  gap: 10px;
  margin-top: 22px;
}

.fill-area {
  grid-template-columns: 1fr auto;
  align-items: end;
}

.fill-area label,
.subjective-area label {
  grid-column: 1 / -1;
  color: var(--muted);
  font-size: 13px;
}

.fill-area input,
.subjective-area textarea {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 12px;
  background: #fff;
  color: var(--text);
}

.fill-area button {
  padding: 0 18px;
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

.result-line {
  min-height: 28px;
  margin-top: 16px;
  font-weight: 700;
}

.result-line.ok {
  color: var(--ok);
}

.result-line.bad {
  color: var(--danger);
}

.answer-panel {
  display: none;
  margin-top: 18px;
  padding: 18px;
  border: 1px solid #cfe5d9;
  border-radius: 8px;
  background: #f7fbf8;
}

.answer-panel.visible {
  display: block;
}

.answer-panel.floating {
  position: absolute;
  left: 26px;
  right: 26px;
  top: 128px;
  z-index: 12;
  max-height: min(58vh, 430px);
  overflow: auto;
  margin: 0;
  border-color: #efb4aa;
  background: rgba(255, 250, 248, 0.98);
  cursor: pointer;
  box-shadow: 0 18px 46px rgba(31, 45, 39, 0.18);
  animation: float-answer-in 0.24s ease;
}

.answer-panel.floating::before {
  content: "参考答案";
  display: inline-flex;
  margin-bottom: 10px;
  padding: 4px 9px;
  border-radius: 999px;
  background: var(--danger-weak);
  color: var(--danger);
  font-size: 13px;
  font-weight: 800;
}

.answer-panel.floating h4:first-child {
  display: none;
}

.answer-panel h4 {
  margin: 0 0 8px;
  color: var(--muted);
  font-size: 14px;
}

.answer-panel p {
  margin: 0 0 12px;
  line-height: 1.7;
}

.confetti-burst {
  position: fixed;
  inset: 0;
  z-index: 90;
  pointer-events: none;
  overflow: hidden;
}

.correct-pop {
  position: absolute;
  left: 50%;
  top: 34%;
  display: grid;
  gap: 4px;
  min-width: 150px;
  padding: 14px 20px;
  border: 1px solid #9ac9b6;
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.96);
  color: var(--accent);
  text-align: center;
  box-shadow: 0 16px 42px rgba(31, 45, 39, 0.18);
  animation: correct-pop 1.2s ease forwards;
}

.correct-pop strong {
  font-size: 24px;
  line-height: 1.1;
}

.correct-pop span {
  color: var(--muted);
  font-size: 13px;
}

.confetti-burst > span {
  position: absolute;
  top: -18px;
  left: var(--x);
  width: 8px;
  height: 14px;
  border-radius: 2px;
  background: var(--color);
  animation: confetti-drop 1.25s ease-out var(--delay) forwards;
}

@keyframes correct-pop {
  0% {
    opacity: 0;
    transform: translate(-50%, 12px) scale(0.84);
  }

  16% {
    opacity: 1;
    transform: translate(-50%, 0) scale(1.06);
  }

  28% {
    transform: translate(-50%, 0) scale(1);
  }

  82% {
    opacity: 1;
  }

  100% {
    opacity: 0;
    transform: translate(-50%, -12px) scale(0.96);
  }
}

@keyframes confetti-drop {
  0% {
    opacity: 0;
    transform: translate3d(0, -24px, 0) rotate(0deg);
  }

  18% {
    opacity: 1;
  }

  100% {
    opacity: 0;
    transform: translate3d(var(--dx), 78vh, 0) rotate(var(--rot));
  }
}

@keyframes float-answer-in {
  from {
    opacity: 0;
    transform: translateY(12px) scale(0.98);
  }

  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

.self-check,
.pager {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 20px;
}

.self-check button,
.pager button {
  padding: 0 18px;
}

#showAnswerBtn,
#nextBtn {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

#showAnswerBtn:hover,
#nextBtn:hover,
.fill-area button:hover {
  background: var(--accent-strong);
}

#knownBtn {
  background: var(--ok-weak);
  border-color: #b7dcc7;
  color: var(--ok);
}

#unknownBtn {
  background: var(--danger-weak);
  border-color: #e3b5ad;
  color: var(--danger);
}

.pager button:disabled:hover {
  background: var(--panel);
  color: var(--ink);
}

.empty {
  padding: 28px;
  border: 1px dashed var(--line);
  border-radius: 8px;
  color: var(--muted);
  background: #fff;
}

@media (max-width: 900px) {
  body {
    background: var(--panel);
  }

  button:not(:disabled):active {
    transform: scale(0.97);
  }

  body.drawer-open {
    overflow: hidden;
  }

  .app-shell {
    display: block;
    min-height: 100dvh;
  }

  .mobile-menu-btn {
    position: fixed;
    top: 10px;
    left: 10px;
    z-index: 35;
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 42px;
    height: 42px;
    border: 1px solid #9ac9b6;
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.94);
    box-shadow: 0 8px 22px rgba(31, 45, 39, 0.1);
  }

  .mobile-menu-btn span {
    display: block;
    width: 18px;
    height: 2px;
    margin: 2px 0;
    border-radius: 999px;
    background: var(--accent);
    transition: transform 0.2s ease, opacity 0.2s ease;
  }

  body.drawer-open .mobile-menu-btn span:nth-child(1) {
    transform: translateY(6px) rotate(45deg);
  }

  body.drawer-open .mobile-menu-btn span:nth-child(2) {
    opacity: 0;
  }

  body.drawer-open .mobile-menu-btn span:nth-child(3) {
    transform: translateY(-6px) rotate(-45deg);
  }

  .drawer-overlay {
    position: fixed;
    inset: 0 0 0 min(86vw, 340px);
    z-index: 25;
    display: block;
    background: rgba(29, 35, 40, 0.24);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.24s ease;
  }

  body.drawer-open .drawer-overlay {
    opacity: 1;
    pointer-events: auto;
  }

  .sidebar {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 30;
    width: min(86vw, 340px);
    height: 100dvh;
    padding: 64px 16px 20px;
    overflow: auto;
    border-right: 1px solid var(--line);
    border-bottom: 0;
    background: rgba(251, 252, 248, 0.96);
    backdrop-filter: blur(10px);
    box-shadow: 18px 0 38px rgba(31, 45, 39, 0.16);
    transform: translateX(-105%);
    transition: transform 0.28s ease;
  }

  body.drawer-open .sidebar {
    transform: translateX(0);
  }

  .topbar {
    display: none;
  }

  .mode-tabs {
    display: grid;
    grid-template-columns: 1fr;
    gap: 6px;
    margin: 0;
  }

  .sub-menu {
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 6px;
  }

  .mode-tab {
    min-height: 32px;
    border-radius: 8px;
    font-size: 13px;
  }

  .main-menu {
    min-height: 36px;
    font-size: 14px;
  }

  .main {
    padding: 54px 0 0;
  }

  .question-card {
    min-height: calc(100dvh - 54px);
    padding: 14px 16px 18px;
    border: 0;
    border-radius: 0;
    background: var(--panel);
    box-shadow: none;
    touch-action: pan-y;
  }

  .question-meta {
    flex-direction: row;
    align-items: center;
    justify-content: space-between;
  }

  .question-meta > div {
    display: flex;
    align-items: center;
    min-width: 0;
  }

  .badge {
    min-height: 24px;
    padding: 0 8px;
    font-size: 12px;
  }

  .progress-text {
    margin-left: 8px;
    font-size: 12px;
  }

  .mark-btn {
    width: 36px;
    min-height: 32px;
    justify-content: center;
    padding: 0;
  }

  .mark-btn span:last-child {
    display: none;
  }

  .progress-bar {
    height: 5px;
    margin: 10px 0 0;
  }

  .question-card h3 {
    display: none;
  }

  .prompt {
    margin-top: 14px;
    padding: 14px;
    font-size: 17px;
    line-height: 1.68;
  }

  .question-image {
    max-width: 100%;
    margin: 12px 0 0;
  }

  .choice-area {
    gap: 8px;
    margin-top: 14px;
  }

  .option-btn {
    grid-template-columns: 32px 1fr;
    min-height: 54px;
    padding: 10px 12px;
    font-size: 16px;
  }

  .option-key {
    width: 30px;
    height: 30px;
  }

  .fill-area,
  .subjective-area {
    margin-top: 14px;
  }

  .fill-area {
    grid-template-columns: 1fr;
  }

  .fill-area.active {
    grid-template-columns: 1fr;
  }

  .fill-area.active button {
    width: 100%;
  }

  .subjective-area textarea {
    min-height: 128px;
  }

  .result-line {
    min-height: 22px;
    margin-top: 10px;
    font-size: 14px;
  }

  .answer-panel {
    margin-top: 10px;
    padding: 12px;
  }

  .answer-panel.floating {
    left: 16px;
    right: 16px;
    top: 118px;
    width: auto;
    max-height: 48vh;
    box-shadow: 0 18px 54px rgba(31, 45, 39, 0.22);
  }

  .answer-panel h4 {
    font-size: 13px;
  }

  .self-check {
    display: grid;
    grid-template-columns: 1.2fr 0.9fr 0.9fr;
    gap: 8px;
    margin-top: 12px;
  }

  .pager {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 8px;
  }

  .self-check button,
  .pager button,
  .fill-area button {
    width: 100%;
    min-height: 42px;
    padding: 0 10px;
  }

  .stats {
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 6px;
  }

  .stats div {
    padding: 9px 4px;
  }

  .stats span {
    font-size: 18px;
  }

  .filters {
    gap: 10px;
  }

  .question-nav {
    grid-template-columns: repeat(auto-fill, minmax(50px, 1fr));
    max-height: none;
    padding: 0 0 24px;
  }
}

@media (max-width: 360px) {
  .stats {
    grid-template-columns: repeat(2, 1fr);
  }
}


.settings-row { display: grid; gap: 8px; margin: 12px 0 0; }
.settings-row label { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--muted); cursor: pointer; }
.settings-row input[type=checkbox] { width: 16px; height: 16px; accent-color: var(--accent); flex-shrink: 0; }
.knowledge-panel { margin-top: 14px; padding: 14px 16px; border: 1px solid rgb(183, 220, 199); border-radius: 8px; background: rgb(247, 251, 248); }
.knowledge-panel.hidden { display: none; }
.knowledge-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 8px; }
.knowledge-tag { display: inline-flex; align-items: center; min-height: 26px; padding: 0 10px; border-radius: 999px; background: var(--accent-weak); color: var(--accent); font-size: 12px; font-weight: 800; }
.knowledge-summary { margin: 0 0 8px; line-height: 1.65; font-size: 14px; color: var(--text); }

function loadQuestionBank() {
  try {
    const saved = localStorage.getItem(BANK_STORAGE_KEY);
    if (!saved) return normalizeQuestionBank(DEFAULT_BANK, "内置题库");
    return normalizeQuestionBank(JSON.parse(saved), "导入题库");
  } catch {
    localStorage.removeItem(BANK_STORAGE_KEY);
    return normalizeQuestionBank(DEFAULT_BANK, "内置题库");
  }
}

function normalizeQuestionBank(input, fallbackTitle = "导入题库") {
  const raw = Array.isArray(input) ? { meta: { title: fallbackTitle }, questions: input } : input || {};
  const rawQuestions = Array.isArray(raw.questions) ? raw.questions : [];
  const normalized = rawQuestions.map((q, index) => normalizeQuestion(q, index)).filter(Boolean);
  return {
    meta: {
      title: raw.meta && raw.meta.title ? String(raw.meta.title) : fallbackTitle,
      source: raw.meta && raw.meta.source ? String(raw.meta.source) : fallbackTitle,
      count: normalized.length
    },
    questions: normalized
  };
}

function normalizeQuestion(q, index) {
  if (!q || typeof q !== "object") return null;
  const type = q.type || (q.options ? "choice" : "short");
  const section = q.section || ({ choice: "选择题", fill: "填空题", code: "算法填空", short: "问答题", design: "算法设计题" }[type] || "题目");
  const number = Number(q.number) || index + 1;
  const title = q.title || `${section} ${number}`;
  const prompt = q.prompt || q.question || q.stem || title;
  let options = q.options;
  if (options && !Array.isArray(options) && typeof options === "object") {
    options = Object.entries(options).map(([key, text]) => ({ key, text }));
  }
  if (type === "choice") {
    options = (Array.isArray(options) ? options : []).map((option, optionIndex) => ({
      key: String(option.key || "ABCD"[optionIndex] || optionIndex + 1),
      text: String(option.text || option.label || option.value || "")
    })).filter((option) => option.text);
    if (!options.length) return null;
  }
  return {
    id: String(q.id || `${type}-${String(number).padStart(2, "0")}`),
    type,
    section,
    number,
    title: String(title),
    prompt: String(prompt),
    ...(options ? { options } : {}),
    answer: q.answer == null ? "" : String(q.answer),
    analysis: q.analysis || q.explanation || q.explain || "",
    ...(q.image ? { image: String(q.image) } : {})
  };
}

function importQuestionBank(input) {
  const nextBank = normalizeQuestionBank(input, "导入题库");
  if (!nextBank.questions.length) throw new Error("没有找到有效题目");
  bank = nextBank;
  questions = nextBank.questions;
  localStorage.setItem(BANK_STORAGE_KEY, JSON.stringify(nextBank));
  app = { ...app, section: "全部题型", status: "all", query: "", index: 0, records: {}, marked: {} };
  initFilters();
  render();
  closeDrawerOnMobile();
  if (els.importHint) els.importHint.textContent = `已导入 ${questions.length} 题`;
  return nextBank;
}

function restoreDefaultBank() {
  if (!confirm("确认恢复内置题库？当前导入题库和答题记录会清空。")) return;
  localStorage.removeItem(BANK_STORAGE_KEY);
  bank = normalizeQuestionBank(DEFAULT_BANK, "内置题库");
  questions = bank.questions || [];
  app = { ...app, section: "全部题型", status: "all", query: "", index: 0, records: {}, marked: {} };
  initFilters();
  render();
  closeDrawerOnMobile();
  if (els.importHint) els.importHint.textContent = "已恢复内置题库";
}

function questionBankTemplate() {

        analysis: "这里写解析。"
      }
    ]
  };
}

function reviewChapters() {
  return REVIEW_GUIDE.chapters || [];
}

function currentReviewChapter() {
  const chapters = reviewChapters();
  const idx = Math.min(Math.max(app.reviewIndex || 0, 0), Math.max(chapters.length - 1, 0));
  return chapters[idx] || null;
}

function renderReviewListItem(it) {
  if (it && typeof it === "object" && it.text) {
    const plain = it.plain ? `<span class="review-plain-inline"> — ${escapeHtml(it.plain)}</span>` : "";
    return `<li>${escapeHtml(it.text)}${plain}</li>`;
  }
  return `<li>${escapeHtml(String(it))}</li>`;
}

function renderReviewBlock(block, idx, collapsed) {
  const typeLabels = { definition: "定义", list: "要点", formula: "公式", steps: "步骤", compare: "对比", tip: "提醒", glossary: "名词", image: "图示", example: "例题", svg: "图解", plain: "通俗" };
  let body = "";
  if (block.type === "glossary" && Array.isArray(block.items)) {
    body = `<dl class="review-glossary">${block.items.map(it => {
      const plain = it.plain ? `<p class="review-plain">💡 ${escapeHtml(it.plain)}</p>` : "";
      return `<dt>${escapeHtml(it.term)}</dt><dd>${escapeHtml(it.def)}${plain}</dd>`;
    }).join("")}</dl>`;
  } else if (block.type === "plain" && block.content) {
    body = `<div class="review-plain">${escapeHtml(block.content)}</div>`;
  } else if ((block.type === "image" || block.type === "svg") && block.src) {
    body = `<figure class="review-figure"><object type="image/svg+xml" data="${escapeAttr(block.src)}"><img src="${escapeAttr(block.src)}" alt="${escapeAttr(block.caption || block.title || "")}" loading="lazy" /></object>${block.caption ? `<figcaption>${escapeHtml(block.caption)}</figcaption>` : ""}</figure>`;
  } else if (block.type === "example") {
    const figs = (block.figures || []).map(f => `<figure class="review-figure"><object type="image/svg+xml" data="${escapeAttr(f.src)}"><img src="${escapeAttr(f.src)}" alt="${escapeAttr(f.caption || "")}" loading="lazy" /></object>${f.caption ? `<figcaption>${escapeHtml(f.caption)}</figcaption>` : ""}</figure>`).join("");
    const steps = block.steps ? `<ol>${block.steps.map(s => `<li>${escapeHtml(s)}</li>`).join("")}</ol>` : "";
    body = `<div class="review-example"><h5>${escapeHtml(block.title || "例题")}</h5>${block.content ? `<p>${escapeHtml(block.content)}</p>` : ""}${steps}${figs}</div>`;
  } else if (block.type === "compare" && Array.isArray(block.items) && block.items.length) {
    const rows = block.items;
    const head = rows[0].map(c => `<th>${escapeHtml(c)}</th>`).join("");
    const bodyRows = rows.slice(1).map(row => `<tr>${row.map(c => `<td>${escapeHtml(c)}</td>`).join("")}</tr>`).join("");
    body = `<div class="review-compare-wrap"><table class="review-compare"><thead><tr>${head}</tr></thead><tbody>${bodyRows}</tbody></table></div>`;
  } else if (block.content) {
    const plain = block.plain ? `<div class="review-plain">💡 ${escapeHtml(block.plain)}</div>` : "";
    body = block.type === "tip"
      ? `<div class="review-tip">${escapeHtml(block.content)}</div>${plain}`
      : `<p>${escapeHtml(block.content)}</p>${plain}`;
  } else if (Array.isArray(block.items)) {
    const tag = block.type === "steps" ? "ol" : "ul";
    body = `<${tag}>${block.items.map(it => renderReviewListItem(it)).join("")}</${tag}>`;
  }
  const cls = collapsed ? "review-block collapsed" : "review-block";
  return `<article class="${cls}" data-block="${idx}">
    <div class="review-block-head" role="button" tabindex="0" aria-expanded="${collapsed ? "false" : "true"}">
      <h4>${escapeHtml(block.title || "要点")}</h4>
      <span class="review-block-type">${typeLabels[block.type] || block.type || ""}</span>
    </div>
    <div class="review-block-body">${body}</div>
  </article>`;
}

function renderReviewNav() {
  const nav = document.getElementById("reviewChapterNav");
  const strip = document.getElementById("reviewChapterStrip");
  const chapters = reviewChapters();
  const html = chapters.map((ch, idx) => {
    const active = idx === (app.reviewIndex || 0) ? "active" : "";
    return `<button type="button" class="review-chapter-btn ${active}" data-review-index="${idx}">
      <span class="review-ch-num">${escapeHtml(ch.number)}</span>
      <span class="review-ch-title">${escapeHtml(ch.title)}</span>
      <span class="review-ch-sub">${escapeHtml(ch.subtitle || "")}</span>
    </button>`;
  }).join("");
  const chipHtml = chapters.map((ch, idx) => {
    const active = idx === (app.reviewIndex || 0) ? "active" : "";
    return `<button type="button" class="review-chapter-chip ${active}" data-review-index="${idx}">${escapeHtml(ch.number)} ${escapeHtml(ch.title)}</button>`;
  }).join("");
  if (nav) nav.innerHTML = html;
  if (strip) strip.innerHTML = chipHtml;
}

function renderReviewContent() {
  const ch = currentReviewChapter();
  const hero = document.getElementById("reviewHero");
  const tags = document.getElementById("reviewExamTags");
  const blocks = document.getElementById("reviewBlocks");
  const footer = document.getElementById("reviewFooter");
  if (!ch || !hero || !blocks) return;

  const plainHero = ch.plainSummary
    ? `<p class="review-hero-plain">💡 ${escapeHtml(ch.plainSummary)}</p>`
    : "";
  hero.innerHTML = `
    <p class="review-hero-kicker">第 ${escapeHtml(ch.number)} 章 · 复习提要</p>
    <h2>${escapeHtml(ch.title)}</h2>
    <p class="review-hero-sub">${escapeHtml(ch.subtitle || "")}</p>
    <p>${escapeHtml(ch.summary || "")}</p>${plainHero}`;

  const query = (app.reviewQuery || "").trim().toLowerCase();
  const focus = (ch.examFocus || []).filter(t => !query || t.toLowerCase().includes(query));
  if (tags) {
    tags.innerHTML = focus.length
      ? focus.map(t => `<span class="review-exam-tag">${escapeHtml(t)}</span>`).join("")
      : (query ? `<span class="review-exam-tag">无匹配考点</span>` : "");
  }

  const blockList = (ch.blocks || []).filter(b => {
    if (!query) return true;
    const blob = [b.title, b.content, b.plain, ...(b.items || []), ...((b.items || []).map(it => typeof it === "object" ? [it.term, it.def, it.plain, it.text].filter(Boolean).join(" ") : it))].flat().join(" ").toLowerCase();
    return blob.includes(query);
  });

  const collapsedDefault = !!app.reviewCollapsed;
  blocks.innerHTML = blockList.length
    ? blockList.map((b, i) => renderReviewBlock(b, i, collapsedDefault)).join("")
    : `<div class="review-block"><div class="review-block-body"><p>未找到匹配内容，请更换关键词。</p></div></div>`;

  if (footer) {
    footer.textContent = `资料来源：${(REVIEW_GUIDE.meta && REVIEW_GUIDE.meta.sources || []).join("、")} · 更新 ${REVIEW_GUIDE.meta && REVIEW_GUIDE.meta.updated || ""}`;
  }

  const searchEl = document.getElementById("reviewSearch");
  if (searchEl && searchEl.value !== (app.reviewQuery || "")) searchEl.value = app.reviewQuery || "";
}

function renderReviewMode() {
  document.body.classList.toggle("mode-review", app.mode === "review");
  renderReviewNav();
  renderReviewContent();
}

function bindReviewEvents() {
  const bindNav = (root) => {
    if (!root || root.dataset.bound) return;
    root.dataset.bound = "1";
    root.addEventListener("click", (e) => {
      const btn = e.target.closest("[data-review-index]");
      if (!btn) return;
      app.reviewIndex = Number(btn.dataset.reviewIndex);
      saveState();
      renderReviewMode();
      closeDrawerOnMobile();
    });
  };
  bindNav(document.getElementById("reviewChapterNav"));
  bindNav(document.getElementById("reviewChapterStrip"));

  const search = document.getElementById("reviewSearch");
  if (search && !search.dataset.bound) {
    search.dataset.bound = "1";
    search.addEventListener("input", () => {
      app.reviewQuery = search.value;
      renderReviewContent();
    });
  }

  const expand = document.getElementById("reviewExpandAll");
  const collapse = document.getElementById("reviewCollapseAll");
  const blocks = document.getElementById("reviewBlocks");
  if (expand && !expand.dataset.bound) {
    expand.dataset.bound = "1";
    expand.addEventListener("click", () => {
      app.reviewCollapsed = false;
      renderReviewContent();
    });
  }
  if (collapse && !collapse.dataset.bound) {
    collapse.dataset.bound = "1";
    collapse.addEventListener("click", () => {
      app.reviewCollapsed = true;
      renderReviewContent();
    });
  }
  if (blocks && !blocks.dataset.bound) {
    blocks.dataset.bound = "1";
    blocks.addEventListener("click", (e) => {
      const head = e.target.closest(".review-block-head");
      if (!head) return;
      head.closest(".review-block").classList.toggle("collapsed");
    });
    blocks.addEventListener("keydown", (e) => {
      if (e.key !== "Enter" && e.key !== " ") return;
      const head = e.target.closest(".review-block-head");
      if (!head) return;
      e.preventDefault();
      head.closest(".review-block").classList.toggle("collapsed");
    });
  }
}

function openReviewChapter(chapterId) {
  const chapters = reviewChapters();
  const idx = chapters.findIndex(c => c.id === chapterId);
  if (idx < 0) return;
  app.mode = "review";
  app.status = "all";
  app.reviewIndex = idx;
  app.reviewQuery = "";
  app.index = 0;
  render();
  closeDrawerOnMobile();
  window.scrollTo({ top: 0, behavior: "smooth" });
}
window.openReviewChapter = openReviewChapter;

function matchKnowledge(q) {
  const blob = [q.section, q.title, q.prompt, q.answer, q.analysis, ...(q.options || []).map(o => o.text)].filter(Boolean).join(" ");
  let best = null, bestScore = 0;
  for (const topic of KNOWLEDGE_TOPICS) {
    let score = 0;
    for (const key of topic.keys) if (blob.includes(key)) score += key.length;
    if (score > bestScore) { bestScore = score; best = topic; }
  }
  if (best) return best;
  const sectionMap = {
    "选择题": KNOWLEDGE_TOPICS.find(t => t.id === "design"),
    "填空题": KNOWLEDGE_TOPICS.find(t => t.id === "design"),
    "算法填空": KNOWLEDGE_TOPICS.find(t => t.id === "divide"),
    "问答题": KNOWLEDGE_TOPICS.find(t => t.id === "design"),
    "算法设计与分析题": KNOWLEDGE_TOPICS.find(t => t.id === "design")
  };
  return sectionMap[q.section] || KNOWLEDGE_TOPICS[0];
}

function renderKnowledgePanel(q, rec, reveal) {
  const panel = document.getElementById("knowledgePanel");
  const peek = document.getElementById("knowledgePeek");
  const peekBtn = document.getElementById("knowledgePeekBtn");
  if (!panel) return;
  const topic = matchKnowledge(q);
  const s = app.settings || defaultSettings();
  const show = (reveal && s.showKnowledge) || rec.knowledgeOpen;
  const canPeek = !reveal && s.peekKnowledge && app.mode === "practice";

  if (peek) peek.hidden = !canPeek;
  if (peekBtn && !peekBtn.dataset.bound) {
    peekBtn.dataset.bound = "1";
    peekBtn.addEventListener("click", () => {
      const qq = currentQuestion();
      if (!qq) return;
      recordFor(qq.id).knowledgeOpen = true;
      render();
    });
  }

  if (!show) {
    panel.classList.add("hidden");
    return;
  }

  const chapterId = TOPIC_CHAPTER_MAP[topic.id];
  document.getElementById("knowledgeTag").textContent = topic.title;
  document.getElementById("knowledgeSummary").textContent = topic.summary;
  document.getElementById("knowledgePoints").innerHTML = topic.points.map(p => `<li>${escapeHtml(p)}</li>`).join("")
    + (chapterId ? `<li><button type="button" class="knowledge-peek-btn" style="margin-top:6px" onclick="openReviewChapter('${chapterId}')">查看完整章节复习 →</button></li>` : "");
  panel.classList.remove("hidden");
}

let app = loadState();
let autoNextTimer = 0;
let swipeStart = null;

function loadState() {
  const fallback = {
    mode: "practice",
    section: "全部题型",
    status: "all",
    query: "",
    index: 0,
    records: {},
    marked: {},
    settings: defaultSettings(),
    reviewIndex: 0,
    reviewQuery: "",
    reviewCollapsed: false
  };
  try {
    const saved = { ...fallback, ...JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}") };
    saved.settings = mergeSettings(saved.settings);
    return saved;
  } catch {
    return fallback;
  }
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(app));
}

function recordFor(id) {
  if (!app.records[id]) {
    app.records[id] = { attempts: 0, revealed: false, correct: null, mastered: null, knowledgeOpen: false };
  }
  return app.records[id];
}

function filteredQuestions() {
  const query = app.query.trim().toLowerCase();
  return questions.filter((q) => {
    const rec = app.records[q.id];
    const marked = Boolean(app.marked[q.id]);
    const done = Boolean(rec && (rec.revealed || rec.mastered !== null || rec.correct !== null));
    const wrong = Boolean(rec && (rec.correct === false || rec.mastered === false));
    if (app.section !== "全部题型" && q.section !== app.section) return false;
    if (app.status === "marked" && !marked) return false;
    if (app.status === "wrong" && !wrong) return false;
    if (app.status === "unanswered" && done) return false;
    if (app.status === "done" && !done) return false;
    if (!query) return true;
    return [q.title, q.prompt, q.answer, q.analysis, q.section]
      .filter(Boolean)
      .join(" ")
      .toLowerCase()
      .includes(query);
  });
}

function initFilters() {
  const sections = ["全部题型", ...new Set(questions.map((q) => q.section))];
  els.sectionFilter.innerHTML = sections.map((section) => {
    return `<option value="${escapeAttr(section)}">${section}</option>`;
  }).join("");
  els.sectionFilter.value = app.section;
  els.statusFilter.value = app.status;
  els.searchInput.value = app.query;
  els.sourceText.textContent = `${bank.meta.source || "本地文档"} · ${questions.length} 题`;
}

function render() {
  if (app.mode === "review") {
    renderMode();
    renderReviewMode();
    saveState();
    return;
  }
  document.body.classList.remove("mode-review");
  const list = filteredQuestions();
  if (app.index >= list.length) app.index = Math.max(0, list.length - 1);
  renderStats();
  renderMode();
  renderNav(list);
  if (!list.length) {
    renderEmpty();
    saveState();
    return;
  }
  renderQuestion(list[app.index], list);
  saveState();
}

function renderStats() {
  const records = Object.values(app.records);
  const done = questions.filter((q) => {
    const rec = app.records[q.id];
    return rec && (rec.revealed || rec.mastered !== null || rec.correct !== null);
  }).length;
  const checked = records.filter((rec) => rec.correct !== null);
  const correct = checked.filter((rec) => rec.correct === true).length;
  const accuracy = checked.length ? Math.round((correct / checked.length) * 100) : 0;
  els.statTotal.textContent = questions.length;
  els.statDone.textContent = done;
  els.statAccuracy.textContent = `${accuracy}%`;
  els.statMarked.textContent = Object.keys(app.marked).length;
}

function renderMode() {
  els.modeTabs.forEach((btn) => {
    const mode = btn.dataset.mode;
    const status = btn.dataset.status;
    const isActive = Boolean((mode && app.mode === mode && app.status === "all") || (status && app.status === status));
    btn.classList.toggle("active", isActive);
  });
  const titles = {
    practice: "刷题模式",
    memorize: "背题模式",
    review: "知识点复习"
  };
  els.pageTitle.textContent = app.status === "wrong" ? "错题本" : app.status === "marked" ? "标记题" : (titles[app.mode] || "刷题模式");
}

function renderNav(list) {
  els.questionNav.innerHTML = list.map((q, idx) => {
    const rec = app.records[q.id];
    const done = rec && (rec.revealed || rec.mastered !== null || rec.correct !== null);
    const wrong = rec && (rec.correct === false || rec.mastered === false);
    const marked = app.marked[q.id];
    const classes = ["nav-item", idx === app.index ? "active" : "", done ? "done" : "", wrong ? "wrong" : "", marked ? "marked" : ""].join(" ");
    return `<button class="${classes}" data-index="${idx}" title="${escapeAttr(q.title)}" aria-current="${idx === app.index ? "true" : "false"}">${shortLabel(q)}</button>`;
  }).join("");
}

function renderEmpty() {
  els.questionTitle.textContent = "没有匹配的题目";
  els.questionPrompt.className = "prompt";
  els.questionPrompt.textContent = "";
  els.typeBadge.textContent = "空";
  els.progressText.textContent = "0 / 0";
  els.progressBar.style.width = "0%";
  els.choiceArea.innerHTML = "";
  els.fillArea.style.display = "none";
  els.fillArea.classList.remove("active");
  els.subjectiveArea.style.display = "none";
  els.answerPanel.classList.remove("visible");
  els.answerPanel.classList.remove("floating");
  els.resultLine.textContent = "";
  els.questionImage.style.display = "none";
  els.prevBtn.disabled = true;
  els.nextBtn.disabled = true;
  els.showAnswerBtn.textContent = "查看答案";
  const kp = document.getElementById("knowledgePanel"); if (kp) kp.classList.add("hidden");
  const af = document.getElementById("answerFigures"); if (af) { af.innerHTML = ""; af.hidden = true; }
  const pk = document.getElementById("knowledgePeek"); if (pk) pk.hidden = true;
  els.questionNav.innerHTML = `<div class="empty">当前筛选下没有题目。</div>`;
}

function renderQuestion(q, list) {
  const rec = recordFor(q.id);
  const reveal = app.mode === "memorize" || rec.revealed;
  els.typeBadge.textContent = q.section;
  els.progressText.textContent = `${app.index + 1} / ${list.length}`;
  els.progressBar.style.width = `${Math.round(((app.index + 1) / list.length) * 100)}%`;
  els.questionTitle.textContent = q.title;
  if (q.type === "fill" || q.type === "code") {
    renderFillPrompt(q, rec, reveal);
  } else {
    els.questionPrompt.className = "prompt";
    els.questionPrompt.textContent = toChineseParens(q.prompt || q.title);
  }
  els.answerText.textContent = q.answer || "暂无答案";
  els.analysisText.textContent = q.analysis || "暂无解析";
  const answerDismissed = rec.correct === false && rec.answerDismissed;
  els.answerPanel.classList.toggle("visible", reveal && !answerDismissed);
  els.answerPanel.classList.toggle("floating", reveal && rec.correct === false && !answerDismissed);
  els.resultLine.textContent = resultText(rec);
  els.resultLine.className = `result-line ${rec.correct === true || rec.mastered === true ? "ok" : rec.correct === false || rec.mastered === false ? "bad" : ""}`;
  els.markBtn.classList.toggle("active", Boolean(app.marked[q.id]));
  els.markBtn.setAttribute("aria-pressed", String(Boolean(app.marked[q.id])));
  els.markIcon.textContent = app.marked[q.id] ? "★" : "☆";
  els.prevBtn.disabled = app.index === 0;
  els.nextBtn.disabled = app.index === list.length - 1;
  els.showAnswerBtn.textContent = reveal ? "已显示答案" : "查看答案";

  if (q.image) {
    els.questionImage.src = q.image;
    els.questionImage.style.display = "block";
  } else {
    els.questionImage.removeAttribute("src");
    els.questionImage.style.display = "none";
  }

  renderAnswerInput(q, rec, reveal);
  renderKnowledgePanel(q, rec, reveal);
  renderAnswerFigures(q, reveal);
  updateKeyboardHint(q);
}

function renderAnswerInput(q, rec, reveal) {
  els.choiceArea.innerHTML = "";
  els.fillArea.style.display = "none";
  els.fillArea.classList.remove("active");
  els.subjectiveArea.style.display = "none";

  if (q.type === "choice") {
    els.choiceArea.innerHTML = (q.options || []).map((option) => {
      const selected = rec.selected === option.key;
      const isCorrect = option.key === q.answer;
      const classes = ["option-btn"];
      if (selected) classes.push("selected");
      if (reveal && isCorrect) classes.push("correct");
      if (reveal && selected && !isCorrect) classes.push("wrong");
      return `<button class="${classes.join(" ")}" data-option="${option.key}" aria-pressed="${selected}">
        <span class="option-key">${option.key}</span>
        <span>${escapeHtml(option.text)}</span>
      </button>`;
    }).join("");
    return;
  }

  if (q.type === "fill" || q.type === "code") {
    els.fillArea.style.display = "grid";
    els.fillArea.classList.add("active");
    if (els.fillInput) els.fillInput.value = rec.input || "";
    return;
  }

  els.subjectiveArea.style.display = "grid";
  els.memoryInput.value = rec.draft || "";
}

function resultText(rec) {
  if (!rec) return "";
  if (rec.correct === true) return "回答正确";
  if (rec.correct === false) return "回答有误，已加入错题本";
  if (rec.mastered === true) return "已标记为会了";
  if (rec.mastered === false) return "已标记为不会，已加入错题本";
  return "";
}

function chooseOption(key) {
  const q = currentQuestion();
  if (!q) return;
  const rec = recordFor(q.id);
  if (app.mode === "practice" && rec.revealed && rec.correct !== null) return;
  rec.selected = key;
  rec.correct = key === q.answer;
  rec.revealed = true;
  rec.answerDismissed = false;
  rec.attempts += 1;
  rec.lastAt = Date.now();
  render();
  if (rec.correct) { launchCorrectSurprise(); scheduleAutoNext(true); }
  else showToast("已加入错题本，看看知识点再试");
}

function submitFill() {
  const q = currentQuestion();
  if (!q) return;
  const rec = recordFor(q.id);
  if (app.mode === "practice" && rec.revealed && rec.correct !== null) return;
  const raw = els.fillInput ? els.fillInput.value.trim() : "";
  rec.input = raw;
  rec.correct = isFillCorrect(collectFillValues(), q.answer);
  rec.revealed = true;
  rec.answerDismissed = false;
  rec.attempts += 1;
  rec.lastAt = Date.now();
  render();
  if (rec.correct) { launchCorrectSurprise(); scheduleAutoNext(true); }
  else showToast("已加入错题本，看看知识点再试");
}

function launchCorrectSurprise() {
  const layer = document.createElement("div");
  layer.className = "confetti-burst";
  const pop = document.createElement("div");
  pop.className = "correct-pop";
  pop.innerHTML = "<strong>答对啦</strong><span>马上进入下一题</span>";
  layer.appendChild(pop);
  const colors = ["#1f7a5a", "#65a97f", "#f2c46d", "#e9865f", "#7fb7a0"];
  for (let i = 0; i < 42; i += 1) {
    const piece = document.createElement("span");
    piece.style.setProperty("--x", `${Math.random() * 100}vw`);
    piece.style.setProperty("--dx", `${Math.random() * 80 - 40}px`);
    piece.style.setProperty("--rot", `${Math.random() * 540 - 270}deg`);
    piece.style.setProperty("--delay", `${Math.random() * 0.18}s`);
    piece.style.setProperty("--color", colors[i % colors.length]);
    layer.appendChild(piece);
  }
  document.body.appendChild(layer);
  window.setTimeout(() => layer.remove(), 1500);
}


const FILL_BLANK_RE = /（\s*）|\(\s*\)|_{2,}|\s{3,}/g;

function toChineseParens(text) {
  return String(text || "")
    .replace(/\(\s*\)/g, "（　　）")
    .replace(/（\s*）/g, "（　　）");
}

function underlineHtml(wide) {
  const cls = ["fill-uline", wide ? "wide" : ""].filter(Boolean).join(" ");
  return `<span class="${cls}" aria-hidden="true"></span>`;
}

function codeBlankHtml(block, wide) {
  const cls = ["code-blank", block ? "code-blank-line" : "", wide ? "wide" : ""].filter(Boolean).join(" ");
  return `<span class="${cls}" aria-hidden="true"></span>`;
}

const CODE_KW_RE = /\b(template|class|void|int|float|if|else|for|while|return|const|Type|Template)\b/g;

function highlightCodeText(text) {
  let out = escapeHtml(toChineseParens(text));
  const holders = [];
  const hold = (match) => {
    const token = `\x00${holders.length}H\x00`;
    holders.push(match);
    return token;
  };
  // 保护 C++ 模板参数，避免误高亮其中的 class / Type
  out = out.replace(/&lt;class\s+Type\s*&gt;/g, (m) => hold(m));
  // 先高亮关键字，再包注释——顺序不能反，否则 class="code-cmt" 会被二次匹配
  out = out.replace(CODE_KW_RE, '<span class="code-kw">$1</span>');
  out = out.replace(/(\/\/[^\n]*)/g, '<span class="code-cmt">$1</span>');
  out = out.replace(/\b(\d+)\b/g, '<span class="code-num">$1</span>');
  holders.forEach((val, i) => {
    out = out.replace(`\x00${i}H\x00`, val);
  });
  return out;
}

function looksLikeCodeLine(line) {
  const s = String(line || "").trim();
  if (!s) return false;
  if (/^(template|void|int|for\s*\(|if\s*\(|while\s*\(|return\b|else\b|#include|using\s|class\s|Template)/i.test(s)) return true;
  if (/[{};<>]/.test(s)) return true;
  return /^\w[\w\s*<>,]*\([^)]*\)\s*[{;]?/.test(s);
}

function splitCodePrompt(prompt, title) {
  const lines = String(prompt || "").split("\n");
  const codeStartIdx = lines.findIndex((line) => looksLikeCodeLine(line));
  if (codeStartIdx <= 0) {
    return {
      intro: codeStartIdx === -1 ? lines.join("\n").trim() : "",
      code: codeStartIdx === -1 ? "" : lines.join("\n"),
    };
  }
  let intro = lines.slice(0, codeStartIdx).join("\n").trim();
  const norm = (s) => String(s || "").replace(/\s+/g, "").replace(/[.．、]/g, "");
  if (intro && norm(intro) === norm(title)) intro = "";
  return { intro, code: lines.slice(codeStartIdx).join("\n") };
}

function renderBlankSegment(seg, type) {
  const wide = Boolean(seg.wide || seg.block);
  if (type === "code") return codeBlankHtml(seg.block, wide);
  return underlineHtml(wide);
}

function renderSegmentsHtml(segments, type) {
  return segments.map((seg) => {
    if (seg.type === "text") {
      return type === "code" ? highlightCodeText(seg.text) : escapeHtml(toChineseParens(seg.text));
    }
    return renderBlankSegment(seg, type);
  }).join("");
}

function parseAnswerParts(answer) {
  return String(answer || "").split(/[;；]/).map((s) => s.trim()).filter(Boolean);
}

function parseFillSegments(prompt, type) {
  const segments = [];
  if (type === "code") {
    const lines = String(prompt || "").split("\n");
    let blankIndex = 0;
    lines.forEach((line, lineIdx) => {
      if (/^\s*;\s*$/.test(line) || /^\s*_{2,}\s*;?\s*$/.test(line)) {
        const indent = line.match(/^\s*/)[0] || "";
        if (indent) segments.push({ type: "text", text: indent });
        segments.push({ type: "blank", index: blankIndex++, block: true, wide: /_{4,}/.test(line) });
        if (lineIdx < lines.length - 1) segments.push({ type: "text", text: "\n" });
        return;
      }
      let last = 0;
      const re = /（\s*）|\(\s*_{2,}\s*\)|\(\s{2,}\)|\(\s*\)|_{2,}|(?<=\S)\s{3,}(?=;|\s*$)/g;
      let m;
      while ((m = re.exec(line)) !== null) {
        if (m.index > last) segments.push({ type: "text", text: line.slice(last, m.index) });
        const token = m[0];
        const block = /^\(\s{2,}\)$/.test(token) || /^\(\s*_{2,}\s*\)$/.test(token);
        const wide = token.length >= 8 || /_{4,}/.test(token);
        segments.push({ type: "blank", index: blankIndex++, block, wide });
        last = re.lastIndex;
      }
      if (last < line.length) segments.push({ type: "text", text: line.slice(last) });
      if (lineIdx < lines.length - 1) segments.push({ type: "text", text: "\n" });
    });
    return segments;
  }
  let lastIndex = 0;
  let blankIndex = 0;
  const re = new RegExp(FILL_BLANK_RE.source, "g");
  let m;
  while ((m = re.exec(prompt)) !== null) {
    if (m.index > lastIndex) segments.push({ type: "text", text: prompt.slice(lastIndex, m.index) });
    segments.push({ type: "blank", index: blankIndex++ });
    lastIndex = re.lastIndex;
  }
  if (lastIndex < prompt.length) segments.push({ type: "text", text: prompt.slice(lastIndex) });
  if (!segments.some((s) => s.type === "blank")) {
    segments.push({ type: "text", text: prompt });
    segments.push({ type: "blank", index: 0 });
  }
  return segments;
}

function getFillValues(rec) {
  if (Array.isArray(rec.fillValues)) return rec.fillValues;
  if (!rec.input) return [];
  return rec.input.split(/[;；]/).map((s) => s.trim());
}

function setFillValues(rec, values) {
  rec.fillValues = values;
  rec.input = values.join("；");
}

function collectFillValues() {
  if (!els.fillInput) return [];
  const raw = els.fillInput.value.trim();
  if (!raw) return [];
  return raw.split(/[;；]/).map((s) => s.trim()).filter(Boolean);
}

function isSingleFillCorrect(input, expected) {
  const val = normalize(input);
  if (!val) return false;
  return String(expected || "")
    .split(/[/／|]/)
    .map((s) => normalize(s))
    .filter(Boolean)
    .some((alt) => val === alt || val.includes(alt) || alt.includes(val));
}

function isFillAnswersCorrect(values, answer) {
  const parts = parseAnswerParts(answer);
  if (!parts.length) return false;
  if (values.length < parts.length) return false;
  return parts.every((part, i) => isSingleFillCorrect(values[i] || "", part));
}

function renderFillPrompt(q, rec, reveal) {
  const parts = parseAnswerParts(q.answer);
  const hint = document.getElementById("fillHint");

  if (q.type === "code") {
    const { intro, code } = splitCodePrompt(q.prompt, q.title);
    const segments = parseFillSegments(code || q.prompt, "code");
    const blankTotal = Math.max(segments.filter((s) => s.type === "blank").length, parts.length, 1);
    const codeHtml = renderSegmentsHtml(segments, "code");

    els.questionPrompt.className = "prompt code-fill-wrap";
    els.questionPrompt.innerHTML =
      (intro ? `<p class="code-intro">${escapeHtml(toChineseParens(intro))}</p>` : "") +
      `<pre class="code-block"><code>${codeHtml}</code></pre>`;

    if (hint) {
      hint.textContent = blankTotal > 1
        ? `本题共 ${blankTotal} 空，请在下方答题区填写，多个空用中文分号「；」分隔。`
        : "请在下方的答题区填写答案。";
    }
    return;
  }

  const segments = parseFillSegments(q.prompt, q.type);
  const blankTotal = Math.max(segments.filter((s) => s.type === "blank").length, parts.length, 1);

  els.questionPrompt.className = "prompt fill-prompt";
  els.questionPrompt.innerHTML = renderSegmentsHtml(segments, "fill");

  if (hint) {
    hint.textContent = blankTotal > 1
      ? `本题共 ${blankTotal} 空，请在下方的答题区填写，多个空用中文分号「；」分隔。`
      : "请在下方的答题区填写答案。";
  }
}

function syncFillInputsToRecord() {
  const q = currentQuestion();
  if (!q || (q.type !== "fill" && q.type !== "code")) return;
  const rec = recordFor(q.id);
  rec.input = els.fillInput ? els.fillInput.value.trim() : "";
  saveState();
}

function checkFillDebounced() {
  clearTimeout(fillCheckTimer);
  fillCheckTimer = setTimeout(() => {
    const q = currentQuestion();
    if (!q || (q.type !== "fill" && q.type !== "code")) return;
    const rec = recordFor(q.id);
    if (rec.revealed && rec.correct !== null) return;
    const raw = els.fillInput ? els.fillInput.value.trim() : "";
    if (!raw) return;
    const values = collectFillValues();
    const parts = parseAnswerParts(q.answer);
    if (values.length < parts.length) return;
    if (!isFillAnswersCorrect(values, q.answer)) return;
    rec.input = raw;
    rec.correct = true;
    rec.revealed = true;
    rec.answerDismissed = false;
    rec.attempts += 1;
    rec.lastAt = Date.now();
    render();
    launchCorrectSurprise();
    scheduleAutoNext(true);
  }, 700);
}

function isFillCorrect(input, answer) {
  const values = Array.isArray(input)
    ? input
    : String(input || "").split(/[;；]/).map((s) => s.trim());
  return isFillAnswersCorrect(values, answer);
}

function normalize(text) {
  return String(text || "")
    .toLowerCase()
    .replace(/\s+/g, "")
    .replace(/[，,；;。.\-_/、：:（）()]/g, "");
}

function showAnswer() {
  const q = currentQuestion();
  if (!q) return;
  const rec = recordFor(q.id);
  if (q.type === "fill" || q.type === "code") rec.input = els.fillInput ? els.fillInput.value.trim() : "";
  if (q.type !== "choice" && q.type !== "fill") rec.draft = els.memoryInput.value;
  rec.revealed = true;
  rec.answerDismissed = false;
  rec.lastAt = Date.now();
  render();
}

function markMastered(mastered) {
  const q = currentQuestion();
  if (!q) return;
  const rec = recordFor(q.id);
  if (q.type !== "choice" && q.type !== "fill") rec.draft = els.memoryInput.value;
  rec.mastered = mastered;
  rec.revealed = true;
  rec.lastAt = Date.now();
  if (q.type !== "choice" && q.type !== "fill") rec.correct = mastered;
  render();
}

function toggleMark() {
  const q = currentQuestion();
  if (!q) return;
  if (app.marked[q.id]) delete app.marked[q.id];
  else app.marked[q.id] = Date.now();
  render();
}

function currentQuestion() {
  return filteredQuestions()[app.index];
}

function dismissFloatingAnswer() {
  const q = currentQuestion();
  if (!q) return;
  const rec = recordFor(q.id);
  if (rec.correct !== false) return;
  rec.answerDismissed = true;
  saveState();
  els.answerPanel.classList.remove("visible", "floating");
}

function go(delta) {
  clearAutoNext();
  clearTimeout(fillCheckTimer);
  dismissFloatingAnswer();
  const q = currentQuestion();
  if (q) recordFor(q.id).knowledgeOpen = false;
  const list = filteredQuestions();
  if (!list.length) return;
  app.index = Math.min(Math.max(app.index + delta, 0), list.length - 1);
  render();
}

function shuffle() {
  clearAutoNext();
  const list = filteredQuestions();
  if (!list.length) return;
  app.index = Math.floor(Math.random() * list.length);
  render();
}

function isMobileViewport() {
  return window.matchMedia("(max-width: 900px)").matches;
}

function setDrawer(open) {
  document.body.classList.toggle("drawer-open", open);
  els.mobileMenuBtn.setAttribute("aria-expanded", String(open));
  els.mobileMenuBtn.setAttribute("aria-label", open ? "关闭菜单" : "打开菜单");
  els.drawerOverlay.hidden = !open;
}

function toggleDrawer() {
  setDrawer(!document.body.classList.contains("drawer-open"));
}

function closeDrawerOnMobile() {
  if (isMobileViewport()) setDrawer(false);
}

function clearAutoNext() {
  window.clearTimeout(autoNextTimer);
}

function scheduleAutoNext(isCorrect) {
  clearAutoNext();
  const list = filteredQuestions();
  const s = app.settings || defaultSettings();
  if (!isCorrect || app.mode !== "practice" || !s.autoAdvance || app.index >= list.length - 1) return;
  autoNextTimer = window.setTimeout(() => go(1), isMobileViewport() ? 1350 : 900);
}

function bindSwipeNavigation() {
  els.questionCard.addEventListener("touchstart", (event) => {
    if (!isMobileViewport() || event.touches.length !== 1) return;
    const touch = event.touches[0];
    swipeStart = {
      x: touch.clientX,
      y: touch.clientY,
      at: Date.now()
    };
  }, { passive: true });

  els.questionCard.addEventListener("touchend", (event) => {
    if (!swipeStart || !isMobileViewport()) return;
    const touch = event.changedTouches[0];
    const deltaX = touch.clientX - swipeStart.x;
    const deltaY = touch.clientY - swipeStart.y;
    const elapsed = Date.now() - swipeStart.at;
    swipeStart = null;
    if (elapsed > 700 || Math.abs(deltaX) < 70 || Math.abs(deltaY) > 55) return;
    go(deltaX < 0 ? 1 : -1);
  }, { passive: true });
}

function resetRecords() {
  const ok = confirm("确认重新刷题？会清空答题记录、错题和标记，题库不会删除。");
  if (!ok) return;
  app.records = {};
  app.marked = {};
  app.index = 0;
  render();
}

function shortLabel(q) {
  const prefix = {
    "选择题": "选",
    "填空题": "填",
    "算法填空": "算",
    "问答题": "问",
    "算法设计与分析题": "设"
  }[q.section] || "题";
  return `${prefix}${q.number}`;
}

function escapeHtml(text) {
  return String(text || "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function escapeAttr(text) {
  return escapeHtml(text).replaceAll("\n", " ");
}

function bindEvents() {
  els.modeTabs.forEach((btn) => {
    btn.addEventListener("click", () => {
      if (btn.dataset.mode) {
        app.mode = btn.dataset.mode;
        app.status = "all";
        if (btn.dataset.mode === "review") app.reviewQuery = "";
      }
      if (btn.dataset.status) {
        app.status = btn.dataset.status;
        app.mode = btn.dataset.status === "marked" ? "memorize" : "practice";
      }
      app.index = 0;
      els.statusFilter.value = app.status;
      dismissFloatingAnswer();
      render();
      closeDrawerOnMobile();
    });
  });

  els.sectionFilter.addEventListener("change", () => {
    app.section = els.sectionFilter.value;
    app.index = 0;
    dismissFloatingAnswer();
    render();
    closeDrawerOnMobile();
  });

  els.statusFilter.addEventListener("change", () => {
    app.status = els.statusFilter.value;
    app.index = 0;
    dismissFloatingAnswer();
    render();
    closeDrawerOnMobile();
  });

  els.searchInput.addEventListener("input", () => {
    app.query = els.searchInput.value;
    app.index = 0;
    dismissFloatingAnswer();
    render();
  });

  els.questionNav.addEventListener("click", (event) => {
    const btn = event.target.closest("[data-index]");
    if (!btn) return;
    dismissFloatingAnswer();
    app.index = Number(btn.dataset.index);
    render();
    closeDrawerOnMobile();
  });

  els.choiceArea.addEventListener("click", (event) => {
    const btn = event.target.closest("[data-option]");
    if (!btn) return;
    chooseOption(btn.dataset.option);
  });

  els.submitFillBtn.addEventListener("click", submitFill);
  els.answerPanel.addEventListener("click", () => {
    if (els.answerPanel.classList.contains("floating")) dismissFloatingAnswer();
  });
  els.showAnswerBtn.addEventListener("click", showAnswer);
  els.knownBtn.addEventListener("click", () => markMastered(true));
  els.unknownBtn.addEventListener("click", () => markMastered(false));
  els.prevBtn.addEventListener("click", () => go(-1));
  els.nextBtn.addEventListener("click", () => go(1));
  els.markBtn.addEventListener("click", toggleMark);
  els.shuffleBtn.addEventListener("click", shuffle);
  els.resetBtn.addEventListener("click", resetRecords);
  els.restartBtn.addEventListener("click", resetRecords);
  els.importFile.addEventListener("change", async () => {
    const file = els.importFile.files && els.importFile.files[0];
    if (!file) return;
    try {
      const text = await file.text();
      importQuestionBank(JSON.parse(text));
    } catch (error) {
      alert(`导入失败：${error.message}`);
      if (els.importHint) els.importHint.textContent = "导入失败，请检查 JSON 格式";
    } finally {
      els.importFile.value = "";
    }
  });
  els.restoreBankBtn.addEventListener("click", restoreDefaultBank);
  els.mobileMenuBtn.addEventListener("click", toggleDrawer);
  els.drawerOverlay.addEventListener("click", () => setDrawer(false));


  els.fillInput.addEventListener("input", () => {
    syncFillInputsToRecord();
    checkFillDebounced();
  });

  els.fillInput.addEventListener("keydown", (event) => {
    if (event.key === "Enter") submitFill();
  });

  els.memoryInput.addEventListener("input", () => {
    const q = currentQuestion();
    if (!q) return;
    recordFor(q.id).draft = els.memoryInput.value;
    saveState();
  });

  document.addEventListener("keydown", (event) => {
    if (event.target.matches("textarea")) return;
    if (event.target.matches("input") && event.key !== "Enter") return;
    const q = currentQuestion();
    if (q && q.type === "choice" && app.mode === "practice") {
      const map = { a: "A", b: "B", c: "C", d: "D", "1": "A", "2": "B", "3": "C", "4": "D" };
      const k = map[event.key.toLowerCase()];
      if (k && q.options.some(o => o.key === k)) { event.preventDefault(); chooseOption(k); return; }
    }
    if (event.key === "ArrowLeft") go(-1);
    if (event.key === "ArrowRight") go(1);
    if (event.key === " ") {
      event.preventDefault();
      showAnswer();
    }
  });

  ["setAutoAdvance", "setShowKnowledge", "setPeekKnowledge"].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    const key = { setAutoAdvance: "autoAdvance", setShowKnowledge: "showKnowledge", setPeekKnowledge: "peekKnowledge" }[id];
    el.addEventListener("change", () => setSetting(key, el.checked));
  });

    bindSwipeNavigation();
}

initFilters();
syncSettingsUI();
bindEvents();
bindReviewEvents();
render();





function toggleDarkMode() {
  document.body.classList.toggle('dark');
  localStorage.setItem('algorithm-review-dark', document.body.classList.contains('dark') ? '1' : '0');
}
if (localStorage.getItem('algorithm-review-dark') === '1') document.body.classList.add('dark');
window.toggleDarkMode = toggleDarkMode;

</script>
</body>
</html>
