<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 480" role="img" aria-label="4皇后搜索空间树">
<style>
  .node{fill:#fff;stroke:#1f7a5a;stroke-width:1.5}
  .node-ok{fill:#e7f4ec;stroke:#24764d}
  .node-sol{fill:#1f7a5a;stroke:#176848}
  .node-prune{fill:#fdecea;stroke:#b44242;stroke-dasharray:4 2}
  .edge{stroke:#66706b;stroke-width:1.2}
  .edge-prune{stroke:#b44242;stroke-width:1.2;stroke-dasharray:5 3}
  .edge-ok{stroke:#24764d;stroke-width:2}
  .lbl{font:11px sans-serif;fill:#334;text-anchor:middle;dominant-baseline:middle}
  .lbl-w{fill:#fff;font-weight:700}
  .title{font:15px sans-serif;font-weight:700;fill:#1d2328;text-anchor:middle}
  .note{font:12px sans-serif;fill:#66706b}
</style>
<text class="title" x="380" y="22">4皇后搜索空间树（回溯 DFS，✕ 表示约束剪枝）</text>
<text class="note" x="380" y="42" text-anchor="middle">只展开满足约束的分支；找到解后仍可继续搜索其他解</text>
<line class="edge-ok" x1="380" y1="79" x2="380" y2="101"/><text class="lbl" x="380.0" y="90.0">2</text><line class="edge-prune" x1="380" y1="79" x2="180" y2="101"/><text class="lbl" x="280.0" y="90.0">1</text><line class="edge-prune" x1="380" y1="79" x2="580" y2="101"/><text class="lbl" x="480.0" y="90.0">4</text><line class="edge-prune" x1="380" y1="129" x2="250" y2="151"/><text class="lbl" x="315.0" y="140.0">2</text><line class="edge-ok" x1="380" y1="129" x2="380" y2="151"/><text class="lbl" x="380.0" y="140.0">4</text><line class="edge-prune" x1="380" y1="129" x2="510" y2="151"/><text class="lbl" x="445.0" y="140.0">3</text><line class="edge-ok" x1="380" y1="179" x2="380" y2="201"/><text class="lbl" x="380.0" y="190.0">1</text><line class="edge-prune" x1="380" y1="179" x2="250" y2="201"/><text class="lbl" x="315.0" y="190.0">4</text><line class="edge-ok" x1="380" y1="229" x2="380" y2="251"/><text class="lbl" x="380.0" y="240.0">3</text><circle class="node" cx="380" cy="65" r="18"/><text class="lbl" x="380" y="65">根</text><circle class="node-ok" cx="380" cy="115" r="18"/><text class="lbl" x="380" y="115">(2)</text><circle class="node-ok" cx="380" cy="165" r="18"/><text class="lbl" x="380" y="165">(2,4)</text><circle class="node-ok" cx="380" cy="215" r="18"/><text class="lbl" x="380" y="215">(2,4,1)</text><circle class="node-sol" cx="380" cy="265" r="18"/><text class="lbl-w" x="380" y="265">(2,4,1,3)</text><circle class="node-prune" cx="180" cy="115" r="18"/><text class="lbl" x="180" y="115">(1)</text><text class="lbl" x="202" y="101" fill="#b44242">✕</text><circle class="node-prune" cx="580" cy="115" r="18"/><text class="lbl" x="580" y="115">(4)</text><text class="lbl" x="602" y="101" fill="#b44242">✕</text><circle class="node-prune" cx="250" cy="165" r="18"/><text class="lbl" x="250" y="165">(2,2)</text><text class="lbl" x="272" y="151" fill="#b44242">✕</text><circle class="node-prune" cx="510" cy="165" r="18"/><text class="lbl" x="510" y="165">(2,3)</text><text class="lbl" x="532" y="151" fill="#b44242">✕</text><circle class="node-prune" cx="250" cy="215" r="18"/><text class="lbl" x="250" y="215">(2,4,4)</text><text class="lbl" x="272" y="201" fill="#b44242">✕</text>
<text class="note" x="380" y="310" text-anchor="middle">绿色路径：DFS 找到第一个可行解 (2,4,1,3)；红色虚线：约束函数判定冲突后剪枝</text>
<text class="note" x="380" y="332" text-anchor="middle">回溯过程：扩展→遇冲突则回退到最近活结点→尝试下一分支</text>
<rect x="50" y="350" width="660" height="110" rx="8" fill="#f7fbf8" stroke="#b7dcc7"/>
<text class="note" x="70" y="375">搜索顺序示例（行1→行4）：先试列1→冲突剪枝；试列2→列4→列1→列3 得解1</text>
<text class="note" x="70" y="397">继续回溯可找到解2 (3,1,4,2)；与解空间树区别：搜索树不含全部无效子树</text>
<text class="note" x="70" y="419">约束函数 place(k,col)：检查第 k 行放 col 是否与 1..k−1 行皇后同行/同列/同对角线</text>
</svg>