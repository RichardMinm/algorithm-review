<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" role="img" aria-label="4皇后解空间树">
<style>
  .node{fill:#fff;stroke:#1f7a5a;stroke-width:1.5}
  .edge{stroke:#66706b;stroke-width:1.2;fill:none}
  .lbl{font:12px sans-serif;fill:#334}
  .elbl{font:11px sans-serif;fill:#1f7a5a;font-weight:600}
  .note{font:12px sans-serif;fill:#66706b}
  .title{font:15px sans-serif;font-weight:700;fill:#1d2328}
</style>
<text class="title" x="360" y="22" text-anchor="middle">4皇后解空间树（按行1→4依次选列，每层最多4个分支）</text>
<text class="note" x="360" y="40" text-anchor="middle">结点标注为已放置皇后的列号序列；完整树共有 4+4²+4³+4⁴ 个扩展层次概念</text>
<line class="edge" x1="360" y1="72" x2="120" y2="108"/><text class="elbl" x="240.0" y="90.0" text-anchor="middle">1</text><line class="edge" x1="360" y1="72" x2="280" y2="108"/><text class="elbl" x="320.0" y="90.0" text-anchor="middle">2</text><line class="edge" x1="360" y1="72" x2="440" y2="108"/><text class="elbl" x="400.0" y="90.0" text-anchor="middle">3</text><line class="edge" x1="360" y1="72" x2="600" y2="108"/><text class="elbl" x="480.0" y="90.0" text-anchor="middle">4</text><line class="edge" x1="120" y1="132" x2="60" y2="178"/><text class="elbl" x="90.0" y="155.0" text-anchor="middle">2</text><line class="edge" x1="120" y1="132" x2="120" y2="178"/><text class="elbl" x="120.0" y="155.0" text-anchor="middle">3</text><line class="edge" x1="120" y1="132" x2="180" y2="178"/><text class="elbl" x="150.0" y="155.0" text-anchor="middle">4</text><line class="edge" x1="280" y1="132" x2="240" y2="178"/><text class="elbl" x="260.0" y="155.0" text-anchor="middle">2</text><line class="edge" x1="280" y1="132" x2="300" y2="178"/><text class="elbl" x="290.0" y="155.0" text-anchor="middle">4</text><line class="edge" x1="280" y1="132" x2="360" y2="178"/><text class="elbl" x="320.0" y="155.0" text-anchor="middle">3</text><line class="edge" x1="440" y1="132" x2="420" y2="178"/><text class="elbl" x="430.0" y="155.0" text-anchor="middle">1</text><line class="edge" x1="440" y1="132" x2="480" y2="178"/><text class="elbl" x="460.0" y="155.0" text-anchor="middle">4</text><line class="edge" x1="600" y1="132" x2="540" y2="178"/><text class="elbl" x="570.0" y="155.0" text-anchor="middle">1</text><line class="edge" x1="600" y1="132" x2="600" y2="178"/><text class="elbl" x="600.0" y="155.0" text-anchor="middle">2</text><circle class="node" cx="360" cy="60" r="16"/><text class="lbl" x="360" y="64" text-anchor="middle">ε</text><circle class="node" cx="120" cy="120" r="16"/><text class="lbl" x="120" y="124" text-anchor="middle">(1)</text><circle class="node" cx="280" cy="120" r="16"/><text class="lbl" x="280" y="124" text-anchor="middle">(2)</text><circle class="node" cx="440" cy="120" r="16"/><text class="lbl" x="440" y="124" text-anchor="middle">(3)</text><circle class="node" cx="600" cy="120" r="16"/><text class="lbl" x="600" y="124" text-anchor="middle">(4)</text><circle class="node" cx="60" cy="190" r="16"/><text class="lbl" x="60" y="194" text-anchor="middle">(1,2)</text><circle class="node" cx="120" cy="190" r="16"/><text class="lbl" x="120" y="194" text-anchor="middle">(1,3)</text><circle class="node" cx="180" cy="190" r="16"/><text class="lbl" x="180" y="194" text-anchor="middle">(1,4)</text><circle class="node" cx="240" cy="190" r="16"/><text class="lbl" x="240" y="194" text-anchor="middle">(2,2)</text><circle class="node" cx="300" cy="190" r="16"/><text class="lbl" x="300" y="194" text-anchor="middle">(2,4)</text><circle class="node" cx="360" cy="190" r="16"/><text class="lbl" x="360" y="194" text-anchor="middle">(2,3)</text><circle class="node" cx="420" cy="190" r="16"/><text class="lbl" x="420" y="194" text-anchor="middle">(3,1)</text><circle class="node" cx="480" cy="190" r="16"/><text class="lbl" x="480" y="194" text-anchor="middle">(3,4)</text><circle class="node" cx="540" cy="190" r="16"/><text class="lbl" x="540" y="194" text-anchor="middle">(4,1)</text><circle class="node" cx="600" cy="190" r="16"/><text class="lbl" x="600" y="194" text-anchor="middle">(4,2)</text><text class="note" x="360" y="240" text-anchor="middle">第3、4层依此类推继续分支，直至得到4元组 (c1,c2,c3,c4)</text>
<text class="note" x="360" y="262" text-anchor="middle">叶结点对应完整放置方案；其中仅 (2,4,1,3) 与 (3,1,4,2) 满足约束</text>
<rect x="40" y="285" width="640" height="115" rx="8" fill="#f7fbf8" stroke="#b7dcc7"/>
<text class="lbl" x="60" y="310">n皇后约束（第 i 行放 x[i] 列）：</text>
<text class="lbl" x="60" y="332">① 不同行（每行恰一后）  ② x[i] ≠ x[j]（不同列）  ③ |i−j| ≠ |x[i]−x[j]|（不同对角线）</text>
<text class="lbl" x="60" y="358">解空间树类型：排列树 / 一般树（每行选列，共 n 层，分支因子最多 n）</text>
</svg>